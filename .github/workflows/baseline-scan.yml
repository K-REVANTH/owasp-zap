name: DAST - OWASP ZAP Baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Juice Shop to start
        run: |
          echo "Waiting for Juice Shop..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Juice Shop is up!"
              exit 0
            fi
            echo "Still waiting... attempt $i"
            sleep 5
          done
          echo "Juice Shop did not start in time"
          exit 1

      - name: Fix Permissions for ZAP
        run: |
          chmod 777 $GITHUB_WORKSPACE
          touch report_html.html report_json.json report_md.md
          chmod 777 report_html.html report_json.json report_md.md

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false              # Don't fail on warnings
          cmd_options: '-a'
          allow_issue_writing: false      # Don't create GitHub issues
        continue-on-error: true           # Even if ZAP exits non-zero, continue

      - name: Show Results Summary
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "       ZAP BASELINE SCAN RESULTS"
          echo "════════════════════════════════════════"

          if [ -f report_json.json ] && [ -s report_json.json ]; then

            HIGH=$(python3 -c "
          import json
          d=json.load(open('report_json.json'))
          alerts=[a for s in d.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskcode')=='3']))
          " 2>/dev/null || echo "0")

            MEDIUM=$(python3 -c "
          import json
          d=json.load(open('report_json.json'))
          alerts=[a for s in d.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskcode')=='2']))
          " 2>/dev/null || echo "0")

            LOW=$(python3 -c "
          import json
          d=json.load(open('report_json.json'))
          alerts=[a for s in d.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskcode')=='1']))
          " 2>/dev/null || echo "0")

            INFO=$(python3 -c "
          import json
          d=json.load(open('report_json.json'))
          alerts=[a for s in d.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskcode')=='0']))
          " 2>/dev/null || echo "0")

            echo " High:          $HIGH"
            echo " Medium:        $MEDIUM"
            echo " Low:           $LOW"
            echo " Informational: $INFO"
            echo ""

            if [ "$HIGH" -gt "0" ]; then
              echo " HIGH severity issues found! Fix them!"
            else
              echo " No HIGH severity issues found"
            fi

          else
            echo " Report file is empty or missing"
          fi

          echo "════════════════════════════════════════"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: ignore
